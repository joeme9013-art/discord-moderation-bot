services:
  - type: web
    name: discord-moderation-bot
    env: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm --prefix=$HOME && $HOME/bin/pnpm install
    startCommand: $HOME/bin/pnpm --filter @workspace/discord-bot run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_BOT_TOKEN
        sync: false       # Set manually in Render dashboard
      - key: DISCORD_GUILD_ID
        sync: false       # Set manually in Render dashboard
      - key: DISCORD_LOG_CHANNEL_ID
        sync: false       # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: discord-bot-db
          property: connectionString

databases:
  - name: discord-bot-db
    databaseName: discord_bot
    plan: free
